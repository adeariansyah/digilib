services:
  # laravel
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: digilib-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - digilib-network

  # web server
  web:
    image: nginx:alpine
    container_name: digilib-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./.docker/nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - digilib-network

  # database
  db:
    image: mariadb:11
    container_name: digilib-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: digilib_db
      MARIADB_USER: dev
      MARIADB_PASSWORD: dev
      MARIADB_ROOT_PASSWORD: root_dev
    volumes:
      - digilib-db-data:/var/lib/mysql
    networks:
      - digilib-network

# jaringan dan storage
networks:
  digilib-network:
    driver: bridge

volumes:
  digilib-db-data:
    driver: local
